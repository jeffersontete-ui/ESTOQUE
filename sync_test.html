<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Teste Sync</title>
<style>
body{font-family:sans-serif;padding:20px;background:#f0f0f0}
.box{background:#fff;border-radius:12px;padding:20px;margin:10px 0;box-shadow:0 2px 8px rgba(0,0,0,.1)}
h2{color:#1a9e6b;text-align:center}
.status{padding:12px;border-radius:8px;text-align:center;font-weight:bold;font-size:16px;margin:10px 0}
.verde{background:#d1fae5;color:#065f46}
.vermelho{background:#fee2e2;color:#991b1b}
.amarelo{background:#fef3c7;color:#92400e}
button{width:100%;padding:16px;border-radius:8px;border:none;font-size:16px;font-weight:bold;cursor:pointer;margin:6px 0}
.btn-verde{background:#1a9e6b;color:#fff}
.btn-laranja{background:#d97706;color:#fff}
.log div{padding:6px 4px;border-bottom:1px solid #eee;font-size:13px}
.ok{color:#065f46}.err{color:#991b1b}.info{color:#1e40af}
</style>
</head>
<body>
<h2>🔥 Diagnóstico de Conexão</h2>

<div class="box">
  <div id="st1" class="status amarelo">1. Verificando internet...</div>
  <div id="st2" class="status amarelo">2. Verificando Firebase...</div>
  <div id="st3" class="status amarelo">3. Verificando sincronização...</div>
</div>

<div class="box">
  <button class="btn-verde" onclick="testarTudo()">🔄 TESTAR CONEXÃO</button>
  <button class="btn-laranja" onclick="forcarConexao()">⚡ FORÇAR RECONEXÃO</button>
</div>

<div class="box">
  <b>Log detalhado:</b>
  <div id="log"></div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,doc,onSnapshot,setDoc,getDoc,enableNetwork,disableNetwork}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app=initializeApp({
  apiKey:"AIzaSyC3nXsBC2ARX8IOLITHUtovPn4DONEQe7g",
  authDomain:"estoque-remedios-7b785.firebaseapp.com",
  projectId:"estoque-remedios-7b785",
  storageBucket:"estoque-remedios-7b785.firebasestorage.app",
  messagingSenderId:"1005921072336",
  appId:"1:1005921072336:web:964ca0ae079b5e796e5ad5"
});

const db=getFirestore(app);
const REF=doc(db,"teste","conn");

const log=(msg,tipo="info")=>{
  const el=document.getElementById("log");
  const t=new Date().toLocaleTimeString("pt-BR");
  el.innerHTML=`<div class="${tipo}">[${t}] ${msg}</div>`+el.innerHTML;
};
const setSt=(id,msg,cor)=>{
  const el=document.getElementById(id);
  el.textContent=msg;el.className="status "+cor;
};

// Teste 1: Internet
const testar1=()=>{
  const ok=navigator.onLine;
  setSt("st1",ok?"✅ Internet: CONECTADO":"❌ Internet: SEM CONEXÃO",ok?"verde":"vermelho");
  log("Internet: "+(ok?"online":"offline"),ok?"ok":"err");
  return ok;
};

// Teste 2: Firebase getDoc
const testar2=async()=>{
  setSt("st2","⏳ Testando Firebase...","amarelo");
  try{
    const timeout=new Promise((_,r)=>setTimeout(()=>r(new Error("timeout 10s")),10000));
    const snap=await Promise.race([getDoc(REF),timeout]);
    setSt("st2","✅ Firebase: CONECTADO","verde");
    log("Firebase getDoc: OK","ok");
    return true;
  }catch(e){
    setSt("st2","❌ Firebase: "+e.message,"vermelho");
    log("Firebase getDoc ERRO: "+e.message,"err");
    return false;
  }
};

// Teste 3: onSnapshot
const testar3=()=>{
  setSt("st3","⏳ Testando tempo real...","amarelo");
  const unsub=onSnapshot(REF,snap=>{
    setSt("st3","✅ onSnapshot: FUNCIONANDO","verde");
    log("onSnapshot recebeu dados","ok");
    unsub();
  },e=>{
    setSt("st3","❌ onSnapshot: "+e.message,"vermelho");
    log("onSnapshot ERRO: "+e.message,"err");
  });
  setTimeout(()=>{
    if(document.getElementById("st3").className.includes("amarelo")){
      setSt("st3","⚠️ onSnapshot: sem resposta em 8s","vermelho");
      log("onSnapshot: timeout","err");
    }
  },8000);
};

window.testarTudo=async()=>{
  log("=== INICIANDO TESTES ===","info");
  const internet=testar1();
  if(internet){
    await testar2();
    testar3();
  }
};

window.forcarConexao=async()=>{
  log("Forçando reconexão...","info");
  setSt("st2","⏳ Forçando...","amarelo");
  try{
    await disableNetwork(db);
    log("Rede desabilitada","info");
    await new Promise(r=>setTimeout(r,1000));
    await enableNetwork(db);
    log("Rede reabilitada","info");
    await testarTudo();
  }catch(e){
    log("Erro ao forçar: "+e.message,"err");
  }
};

// Rodar automaticamente
log("Dispositivo: "+(navigator.userAgent.includes("Mobile")?"📱 CELULAR":"💻 PC"),"info");
testarTudo();
</script>
</body>
</html>
