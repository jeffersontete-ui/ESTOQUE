<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Teste Firebase</title>
<style>
body{font-family:sans-serif;padding:20px;max-width:500px;margin:0 auto}
.card{background:#f3f4f6;border-radius:12px;padding:16px;margin:10px 0}
.ok{background:#d1fae5;color:#065f46}
.err{background:#fee2e2;color:#991b1b}
button{padding:10px 20px;border-radius:8px;border:none;background:#1a9e6b;color:#fff;font-size:16px;cursor:pointer;margin:5px}
input{width:100%;padding:10px;border-radius:8px;border:1px solid #d1d5db;font-size:16px;margin:5px 0;box-sizing:border-box}
#log{font-size:13px;font-family:monospace;max-height:300px;overflow-y:auto}
.entry{padding:4px 0;border-bottom:1px solid #e5e7eb}
</style>
</head>
<body>
<h2>🔥 Teste Firebase Sync</h2>
<div id="status" class="card">Conectando...</div>
<div class="card">
  <b>Enviar mensagem de teste:</b><br>
  <input type="text" id="msg" placeholder="Digite algo..." value="Teste de sincronização">
  <button onclick="enviar()">📤 Enviar</button>
</div>
<div class="card">
  <b>Mensagens recebidas em tempo real:</b>
  <div id="log">Aguardando...</div>
</div>
<div class="card">
  <b>Dados do Firestore:</b>
  <div id="dados">Carregando...</div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,doc,onSnapshot,setDoc,getDoc,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const FB={
  apiKey:"AIzaSyC3nXsBC2ARX8IOLITHUtovPn4DONEQe7g",
  authDomain:"estoque-remedios-7b785.firebaseapp.com",
  projectId:"estoque-remedios-7b785",
  storageBucket:"estoque-remedios-7b785.firebasestorage.app",
  messagingSenderId:"1005921072336",
  appId:"1:1005921072336:web:964ca0ae079b5e796e5ad5"
};

const db = getFirestore(initializeApp(FB));
const testRef = doc(db, "estoque", "sync_test");
const mainRef = doc(db, "estoque", "dados");

const log = (msg, ok=true) => {
  const el = document.getElementById("log");
  const d = new Date().toLocaleTimeString("pt-BR");
  el.innerHTML = `<div class="entry">[${d}] ${msg}</div>` + el.innerHTML;
};

// Mostrar status
const setStatus = (msg, ok) => {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className = "card " + (ok ? "ok" : "err");
};

// Listener no documento de teste
onSnapshot(testRef, snap => {
  if(snap.exists()) {
    const d = snap.data();
    log(`📥 Recebido: "${d.msg}" — de: ${d.de} — às ${d.hora}`);
    setStatus("✅ Firebase conectado e sincronizando!", true);
  }
}, err => {
  setStatus("❌ Erro: " + err.message, false);
  log("ERRO: " + err.message);
});

// Listener nos dados principais
onSnapshot(mainRef, snap => {
  if(snap.exists()) {
    const d = snap.data();
    document.getElementById("dados").innerHTML = `
      <b>Medicamentos:</b> ${(d.meds||[]).length}<br>
      <b>Movimentações:</b> ${(d.movs||[]).length}<br>
      <b>Usuários:</b> ${(d.users||[]).length}<br>
      <b>Logs:</b> ${(d.logs||[]).length}
    `;
  }
}, err => {
  document.getElementById("dados").textContent = "Erro: " + err.message;
});

window.enviar = async () => {
  const msg = document.getElementById("msg").value;
  if(!msg) return;
  try {
    await setDoc(testRef, {
      msg,
      de: navigator.userAgent.includes("Mobile") ? "📱 Celular" : "💻 PC",
      hora: new Date().toLocaleTimeString("pt-BR"),
      ts: Date.now()
    });
    log(`📤 Enviado: "${msg}"`);
  } catch(e) {
    log("ERRO ao enviar: " + e.message);
    setStatus("❌ Erro ao salvar: " + e.message, false);
  }
};

log("Iniciando listeners...");
</script>
</body>
</html>
