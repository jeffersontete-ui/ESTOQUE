<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Teste Direto Firebase</title>
<style>
body{font-family:sans-serif;padding:16px;max-width:500px;margin:0 auto;font-size:16px}
.ok{background:#d1fae5;padding:12px;border-radius:8px;margin:8px 0;color:#065f46}
.err{background:#fee2e2;padding:12px;border-radius:8px;margin:8px 0;color:#991b1b}
.info{background:#e0f2fe;padding:12px;border-radius:8px;margin:8px 0;color:#0369a1}
button{width:100%;padding:14px;border-radius:8px;border:none;background:#1a9e6b;color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin:4px 0}
#log{font-size:13px;font-family:monospace}
</style>
</head>
<body>
<h2>🔥 Teste Direto Firebase</h2>
<div id="status" class="info">Iniciando...</div>
<button onclick="escrever()">📤 ESCREVER no Firebase</button>
<button onclick="ler()">📥 LER do Firebase</button>
<button onclick="escutarTudo()">👂 ESCUTAR mudanças</button>
<div id="log"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,doc,onSnapshot,setDoc,getDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app=initializeApp({
  apiKey:"AIzaSyC3nXsBC2ARX8IOLITHUtovPn4DONEQe7g",
  authDomain:"estoque-remedios-7b785.firebaseapp.com",
  projectId:"estoque-remedios-7b785",
  storageBucket:"estoque-remedios-7b785.firebasestorage.app",
  messagingSenderId:"1005921072336",
  appId:"1:1005921072336:web:964ca0ae079b5e796e5ad5"
});

const db=getFirestore(app);
const REF=doc(db,"estoque","dados");
const TREF=doc(db,"teste","sync");

const log=(msg,tipo="info")=>{
  const d=new Date().toLocaleTimeString("pt-BR");
  document.getElementById("log").innerHTML=
    `<div class="${tipo}">[${d}] ${msg}</div>`+
    document.getElementById("log").innerHTML;
  document.getElementById("status").textContent=msg;
  document.getElementById("status").className=tipo;
};

// Escutar mudanças em tempo real
window.escutarTudo=()=>{
  log("Iniciando escuta em tempo real...","info");
  onSnapshot(TREF,snap=>{
    if(snap.exists()){
      const d=snap.data();
      log(`📥 RECEBIDO: "${d.msg}" de: ${d.de} às ${d.hora}`,"ok");
    }
  },e=>log("ERRO escuta: "+e.message,"err"));
  
  onSnapshot(REF,snap=>{
    if(snap.exists()){
      const d=snap.data();
      const users=d.users||[];
      const meds=d.meds||[];
      log(`📊 DADOS: ${meds.length} meds, ${users.length} users`,"info");
    }else{
      log("❌ Documento estoque/dados não existe!","err");
    }
  },e=>log("ERRO dados: "+e.message,"err"));
};

window.escrever=async()=>{
  try{
    const dados={
      msg:"Teste "+(Math.random()*1000|0),
      de:navigator.userAgent.includes("Mobile")?"📱 CELULAR":"💻 PC",
      hora:new Date().toLocaleTimeString("pt-BR"),
      ts:Date.now()
    };
    log("Escrevendo...","info");
    await setDoc(TREF,dados);
    log("✅ ESCRITO com sucesso: "+dados.msg,"ok");
  }catch(e){log("❌ ERRO ao escrever: "+e.message,"err");}
};

window.ler=async()=>{
  try{
    log("Lendo...","info");
    const snap=await getDoc(TREF);
    if(snap.exists()){
      const d=snap.data();
      log(`✅ LIDO: "${d.msg}" de: ${d.de}`,"ok");
    }else{
      log("⚠️ Documento não existe","err");
    }
  }catch(e){log("❌ ERRO ao ler: "+e.message,"err");}
};

// Iniciar escuta automaticamente
escutarTudo();
</script>
</body>
</html>
